name: "Build artifacts (RocksDB)"

on:
  pull_request:
    branches:
      - "debank"
  release:
    types:
      - created
      - released

  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1
  REGISTRY: 294354037686.dkr.ecr.ap-northeast-1.amazonaws.com
  IMAGE: blockchain/kava-x
  DOCKERFILE: Dockerfile.debank-rocksdb

jobs:
  build-rocksdb:
    runs-on: [ self-hosted, "amd64" ]
    steps:

      - name: Checkout code
        uses: actions/checkout@v2

      - uses: tibdex/github-app-token@v1
        id: generate-token
        with:
          app_id: ${{ secrets.RELEASE_MANAGER_APP_ID }}
          private_key: ${{ secrets.RELEASE_MANAGER_APP_SECRET }}

      - name: Set env (determine image tag)
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "REVISION=${GITHUB_REF#refs/*/}-rocksdb" >> $GITHUB_ENV
          else
            echo "REVISION=$(git rev-parse --short=7 HEAD)-rocksdb" >> $GITHUB_ENV
          fi
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          file: ${{ env.DOCKERFILE }}
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:amd64-${{ env.REVISION }}
          build-args: GITHUB_TOKEN=${{ steps.generate-token.outputs.token }}
          provenance: false
