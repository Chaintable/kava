name: "Build artifacts"

on:
  pull_request:
    branches:
      - "debank"
  release:
    types:
      - created
      - released

  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  REGISTRY: public.ecr.aws/b2h7a5c4/chaintable
  IMAGE: kava-writer
  DOCKERFILE: Dockerfile.debank

jobs:
  build-artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate app token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_MANAGER_APP_ID }}
          private-key: ${{ secrets.RELEASE_MANAGER_APP_SECRET }}
          owner: ${{ github.repository_owner }}

      - name: Set env (determine image tag)
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "REVISION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          else
            echo "REVISION=$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV
          fi
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          file: ${{ env.DOCKERFILE }}
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ matrix.arch }}-${{ env.REVISION }}
          build-args: GITHUB_TOKEN=${{ steps.generate-token.outputs.token }}
          provenance: false

  merge-docker-manifest:
    runs-on: ubuntu-latest
    needs: build-artifacts
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set env (determine image tag)
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "REVISION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          else
            echo "REVISION=$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV
          fi
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Merge manifest
        run: |
          docker buildx imagetools create --tag ${REGISTRY}/${IMAGE}:${REVISION} ${REGISTRY}/${IMAGE}:amd64-${REVISION} ${REGISTRY}/${IMAGE}:arm64-${REVISION}
